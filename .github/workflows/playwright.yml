name: Playwright Tests (UI + API)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run UI & API Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      # 🔗 Run API Tests
      - name: ▶️ Run API Tests
        run: npx playwright test tests/api

      # 🌐 Run UI Tests
      - name: ▶️ Run UI Tests
        run: npx playwright test tests/ui

      # 📊 Upload Playwright HTML report
      - name: 📊 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # 📈 Upload Monocart report
      - name: 📈 Upload Monocart Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report
          path: monocart-report/
          retention-days: 7